apiVersion: v1
kind: ConfigMap
metadata:
  name: umbrella-config
  namespace: sych-umb
data:
  # ─── PostgreSQL ───────────────────────────────────────────────
  POSTGRES_DB: "umbrella"
  POSTGRES_USER: "umbrella_user"
  POSTGRES_PASSWORD: "umbrella_pass"

  # ─── Backend ──────────────────────────────────────────────────
  DB_HOST: "db"
  DB_PORT: "5432"
  DB_NAME: "umbrella"
  DB_USER: "umbrella_user"
  DB_PASSWORD: "umbrella_pass"
  JWT_SECRET: "umbrella-jwt-secret-change-in-production"
  JWT_EXPIRES_IN: "24h"
  OPENROUTER_API_KEY: "aaaa"
  OPENROUTER_MODEL: "qwen/qwen3-235b-a22b-2507"
  PORT: "4000"
  GEOSERVER_REST_URL: "http://geoserver:8080/geoserver/rest"
  GEOSERVER_WMS_URL: "http://geoserver:8080/geoserver"
  GEOSERVER_USER: "admin"
  GEOSERVER_PASSWORD: "geoserver"
  CLIP_SERVICE_URL: "http://clip-service:3005"
  GEOJSON_DIR: "/app/geojson"

  # ─── GeoServer ────────────────────────────────────────────────
  GEOSERVER_ADMIN_USER: "admin"
  GEOSERVER_ADMIN_PASSWORD: "geoserver"

  # ─── Clip Service ─────────────────────────────────────────────
  GEOSERVER_URL: "http://geoserver:8080/geoserver"
  OUTPUT_DIR: "/data/clipped-rasters"
  GEOSERVER_FILE_BASE: "/opt/clipped-rasters"
