# ─── PVC ────────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: geoserver-data-pvc
  namespace: sych-umb
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn

---
# ─── PVC (clipped rasters shared with clip-service) ────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clipped-rasters-pvc
  namespace: sych-umb
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: longhorn

---
# ─── Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geoserver
  namespace: sych-umb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: geoserver
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: geoserver
    spec:
      nodeName: worker-04
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z db 5432; do echo waiting for db; sleep 2; done;
      containers:
        - name: geoserver
          image: kartoza/geoserver:2.24.0
          ports:
            - containerPort: 8080
          env:
            - name: GEOSERVER_ADMIN_USER
              valueFrom:
                configMapKeyRef:
                  name: umbrella-config
                  key: GEOSERVER_ADMIN_USER
            - name: GEOSERVER_ADMIN_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: umbrella-config
                  key: GEOSERVER_ADMIN_PASSWORD
          volumeMounts:
            - name: geoserver-data
              mountPath: /opt/geoserver/data_dir
            - name: tiffs
              mountPath: /data/tiffs
              readOnly: true
            - name: clipped-rasters
              mountPath: /opt/clipped-rasters
              readOnly: true
          livenessProbe:
            httpGet:
              path: /geoserver/web/
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /geoserver/web/
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: geoserver-data
          persistentVolumeClaim:
            claimName: geoserver-data-pvc
        - name: clipped-rasters
          persistentVolumeClaim:
            claimName: clipped-rasters-pvc
        - name: tiffs
          hostPath:
            path: /home/z/my-project/project/data/tiffs
            type: DirectoryOrCreate

---
# ─── Service ────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: geoserver
  namespace: sych-umb
spec:
  selector:
    app: geoserver
  ports:
    - port: 8080
      targetPort: 8080
