apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-runner
  namespace: umbrella
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-runner
  template:
    metadata:
      labels:
        app: github-runner
    spec:
      serviceAccountName: github-runner-sa
      containers:
        - name: github-runner
          image: myoung34/github-runner:latest
          env:
            - name: REPO_URL
              value: "https://github.com/mehdi-chebbi/umbrella-sychelle"
            - name: RUNNER_NAME_PREFIX
              value: "k8s-runner"
            - name: RANDOM_RUNNER_SUFFIX
              value: "true"
            - name: REPLACE_EXISTING_RUNNER
              value: "true"
            - name: RUNNER_WORKDIR
              value: "/tmp/runner"
            - name: RUNNER_SCOPE
              value: "repo"
            - name: LABELS
              value: "self-hosted,linux,k8s"
            - name: ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-runner-secret
                  key: token
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner-sa
  namespace: umbrella

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-runner-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "secrets"]
    verbs: ["get", "list", "create", "delete", "watch", "patch", "apply"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-runner-binding
subjects:
  - kind: ServiceAccount
    name: github-runner-sa
    namespace: umbrella
roleRef:
  kind: ClusterRole
  name: github-runner-role
  apiGroup: rbac.authorization.k8s.io
