# ─── Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sych-umb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeName: worker-04
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z db 5432; do echo waiting for db; sleep 2; done;
        - name: wait-for-geoserver
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z geoserver 8080; do echo waiting for geoserver; sleep 5; done;
      containers:
        - name: backend
          image: mehdino123/umb-tun-back:latest14
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: umbrella-config
          volumeMounts:
            - name: geojson
              mountPath: /app/geojson
              readOnly: true
            - name: tiffs
              mountPath: /data/tiffs
              readOnly: true

      volumes:
        - name: geojson
          hostPath:
            path: /home/z/my-project/project/mini-services/clip-service/geojson
            type: DirectoryOrCreate
        - name: tiffs
          hostPath:
            path: /home/z/my-project/project/data/tiffs
            type: DirectoryOrCreate

---
# ─── Service ────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: sych-umb
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
