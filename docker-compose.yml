services:
  # ─── PostgreSQL Database ──────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3-alpine
    container_name: umbrella-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umbrella
      POSTGRES_USER: umbrella_user
      POSTGRES_PASSWORD: umbrella_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbrella_user -d umbrella"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── GeoServer ────────────────────────────────────────────────
  geoserver:
    image: kartoza/geoserver:2.24.0
    container_name: umbrella-geoserver
    restart: unless-stopped
    environment:
      GEOSERVER_ADMIN_USER: admin
      GEOSERVER_ADMIN_PASSWORD: geoserver
    ports:
      - "8081:8080"
    volumes:
      - geoserver_data:/opt/geoserver/data_dir
      - ./data/tiffs:/data/tiffs:ro
      - clipped_rasters:/opt/clipped-rasters:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/geoserver/web/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy

  # ─── Express Backend API ─────────────────────────────────────
  backend:
    build: ./backend
    container_name: umbrella-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: umbrella
      DB_USER: umbrella_user
      DB_PASSWORD: umbrella_pass
      JWT_SECRET: umbrella-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      OPENROUTER_API_KEY: change this
      OPENROUTER_MODEL: qwen/qwen3-235b-a22b-2507
      PORT: 4000
      GEOSERVER_REST_URL: http://geoserver:8080/geoserver/rest
      GEOSERVER_WMS_URL: http://geoserver:8080/geoserver
      GEOSERVER_USER: admin
      GEOSERVER_PASSWORD: geoserver
      CLIP_SERVICE_URL: http://clip-service:3005
      GEOJSON_DIR: /app/geojson
    volumes:
      - ./mini-services/clip-service/geojson:/app/geojson:ro
      - ./data/tiffs:/data/tiffs:ro
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      geoserver:
        condition: service_healthy

  # ─── Clipping Microservice ───────────────────────────────────
  clip-service:
    build: ./mini-services/clip-service
    container_name: umbrella-clip-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    volumes:
      - ./mini-services/clip-service/geojson:/app/geojson:ro
      - ./data/tiffs:/data/tiffs:ro
      - clipped_rasters:/data/clipped-rasters
    environment:
      GEOSERVER_URL: http://geoserver:8080/geoserver
      GEOSERVER_USER: admin
      GEOSERVER_PASSWORD: geoserver
      OUTPUT_DIR: /data/clipped-rasters
      GEOSERVER_FILE_BASE: /opt/clipped-rasters
      GEOJSON_DIR: /app/geojson
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: umbrella
      DB_USER: umbrella_user
      DB_PASSWORD: umbrella_pass
    depends_on:
      db:
        condition: service_healthy
      geoserver:
        condition: service_healthy

  # ─── React Frontend (Nginx) ──────────────────────────────────
  frontend:
    build: ./frontend
    container_name: umbrella-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
      - geoserver

volumes:
  pgdata:
  geoserver_data:
  clipped_rasters:
